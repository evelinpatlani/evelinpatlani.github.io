<div class="section">
  <h2 class="section-title">Work Experience</h2>

  <div class="job-entry" *ngFor="let job of workExperience">
    <div class="job-marker"></div>
    <div class="job-content">
      <div class="job-header">
        <span class="job-dates">{{ job.startDate }} – {{ job.endDate }}</span>
        <span class="job-location">{{ job.location }}</span>
      </div>
     <div class="job-position">{{ job.position }}</div>
<div class="job-company">{{ job.company }}</div>
<ul class="job-accomplishments">
  <li *ngFor="let item of job.accomplishments">{{ item }}</li>
</ul>
  </div>
</div>
