<div class="section">
  <h2 class="section-title">Skills &amp; Competences</h2>

  <div class="skills-scale">
    <span></span>
    <span class="scale-tick"></span>
    <span class="scale-tick"></span>
    <span class="scale-tick"></span>
    <span class="scale-tick"></span>
  </div>

  <div *ngFor="let item of skillsList">
    <div class="skill-row" *ngFor="let skill of item.skills1; let i = index">
      <span class="skill-label">{{ skill }}</span>
      <div class="skill-bar-wrap">
        <div class="skill-bar" [style.width]="getBarWidth(i)"></div>
      </div>
    </div>
  </div>
</div>
